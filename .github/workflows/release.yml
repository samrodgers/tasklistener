name: Build installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/release.yml"
      - "apps/**"
      - "crates/**"
      - "Cargo.toml"

permissions:
  contents: write   # needed for release uploads on tag pushes

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p tasklistener-core

  macos:
    needs: test-core
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install xcodegen and create-dmg
        run: brew install xcodegen create-dmg

      - name: Build .app and .dmg
        run: ./scripts/build-macos.sh
        env:
          # CI builds are unsigned. To sign, add an Apple Developer ID cert as
          # a base64 secret and decode it into the keychain here, then export
          # DEVELOPER_ID. Optional NOTARIZATION_PROFILE for notarytool.
          DEVELOPER_ID: ""
          NOTARIZATION_PROFILE: ""

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskListener-macos
          path: dist/*.dmg
          if-no-files-found: error

      - name: Attach DMG to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

  windows:
    needs: test-core
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build .exe installer
        run: ./scripts/build-windows.ps1 -Configuration Release -Platform x64
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskListener-windows-x64
          path: dist/*.exe
          if-no-files-found: error

      - name: Attach installer to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
